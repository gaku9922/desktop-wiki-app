<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>社内Wiki</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <header class="app-header">
    <button class="icon-btn" id="sidebarToggle" title="サイドバーの表示切替" aria-label="サイドバーの表示切替">☰</button>
    <button class="app-header__title" id="homeLink" title="トップへ">社内Wiki</button>
    <span class="root-badge" id="rootBadge">読み込み中…</span>
    <button class="user-badge" id="userBadge" title="クリックで名前を変更" hidden>
      <span class="user-badge__icon">●</span>
      <span class="user-badge__name" id="userBadgeName"></span>
    </button>
  </header>

  <div class="layout" id="layout">

    <!-- ===== 左: サイドバー（検索 + Wikiツリー） ===== -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar__search">
        <div class="sidebar__header">
          <span class="sidebar__title">検索</span>
        </div>
        <div class="search-box">
          <input class="form-input search-box__input" type="search" id="searchKeyword"
                 placeholder="キーワード（タイトル・本文）">
          <select class="form-select search-box__tag" id="searchTag">
            <option value="">タグで検索…</option>
          </select>
        </div>
      </div>
      <div class="sidebar__header">
        <span class="sidebar__title">Wikiツリー</span>
        <button class="icon-btn" id="refreshBtn" title="更新">↺</button>
      </div>
      <div class="sidebar__tree" id="tree">
        <p class="placeholder">読み込み中…</p>
      </div>
    </aside>

    <!-- ===== 右: メインビュー（ルーターが描画） ===== -->
    <main class="view" id="view"></main>

  </div>

  <!-- ===== ユーザー登録 / 名前変更モーダル ===== -->
  <div class="modal-overlay" id="userModal" hidden>
    <div class="modal-card">
      <h2 class="modal-title" id="userModalTitle">ようこそ</h2>
      <p class="modal-desc" id="userModalDesc">お名前を登録してください。</p>
      <label class="form-label">
        名前
        <input class="form-input" type="text" id="userNameInput"
               placeholder="山田 太郎" autocomplete="off">
      </label>
      <p class="editor-error" id="userModalError"></p>
      <div class="modal-actions">
        <button class="btn" id="userCancelBtn" hidden>キャンセル</button>
        <button class="btn btn--primary" id="userSaveBtn">登録</button>
      </div>
    </div>
  </div>

  <script src="./renderer.js"></script>
</body>
</html>
